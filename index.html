<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente de Atribuição CREA - Ambiental Pro</title>
    <meta name="description" content="Assistente virtual especialista em legislação do CREA para alunos da Ambiental Pro.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <img src="assets/Logo com slogan.svg" alt="Ambiental Pro" class="header-logo">
                <div class="header-actions" style="display: flex; gap: 1rem; align-items: center;">
                    <div class="dropdown">
                        <button class="btn-download" id="btnDownload">
                            <i class="fa-solid fa-cloud-arrow-down"></i> Docs
                        </button>
                        <div class="dropdown-content" id="dropdownContent">
                            <a href="Documentos/Docs para download/PPC GGSR.pdf" download="PPC GGSR.pdf" target="_blank">
                                <i class="fa-solid fa-file-pdf"></i> PPC GGSR
                            </a>
                            <a href="Documentos/Docs para download/Comprovante de Registro no CREA.pdf" download="Comprovante de Registro no CREA.pdf" target="_blank">
                                <i class="fa-solid fa-file-pdf"></i> Comprovante de Registro
                            </a>
                            <a href="Documentos/Docs para download/Ofício nº 09470_2025 - Registro no CREA-RJ.pdf" download="Ofício nº 09470_2025 - Registro no CREA-RJ.pdf" target="_blank">
                                <i class="fa-solid fa-file-pdf"></i> Ofício Registro CREA-RJ
                            </a>
                        </div>
                    </div>
                    <button id="restartBtn" class="restart-btn">
                        <i class="fa-solid fa-rotate-right"></i> Recomeçar
                    </button>
                </div>
            </div>
        </header>

        <main class="main-content">
            <section class="chat-section" id="chatSection">
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <!-- Mensagens aparecerão aqui -->
                    </div>
                    
                    <div class="chat-suggestions" id="chatSuggestions">
                        <button class="suggestion-chip">Quais são as disciplinas exigidas por lei para a atribuição?</button>
                        <button class="suggestion-chip">Qual é o passo a passo para dar entrada no processo no CREA?</button>
                        <button class="suggestion-chip">Minha formação atual me permite assinar o INCRA?</button>
                    </div>

                    <!-- Container flexível que oculta/mostra a área de input -->
                    <div class="dynamic-input-wrapper" id="dynamicInputWrapper" style="opacity: 0; pointer-events: none;">
                        <div class="interactive-options" id="interactiveOptions" style="display: none;">
                            <!-- Botões de Sim/Não serão injetados aqui -->
                        </div>

                        <div class="chat-input-container" id="chatInputContainer">
                            <form id="chatForm">
                                <input type="text" id="userInput" placeholder="Digite sua resposta..." autocomplete="off">
                                <button type="submit" id="sendBtn">
                                    <i class="fa-solid fa-paper-plane"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
