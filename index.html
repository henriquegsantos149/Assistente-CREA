<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistente de Atribuição CREA - Ambiental Pro</title>
    <meta name="description" content="Assistente virtual especialista em legislação do CREA para alunos da Ambiental Pro.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <img src="assets/Logo com slogan.svg" alt="Ambiental Pro" class="header-logo">
                <button id="restartBtn" class="restart-btn">
                    <i class="fa-solid fa-rotate-right"></i> Recomeçar
                </button>
            </div>
        </header>

        <main class="main-content">
            <!-- Modal de Perfil (Pop-up Centralizado) -->
            <div id="profileModal" class="modal-overlay">
                <div class="modal-content">
                    <div class="modal-header">
                        <img src="assets/Logo com slogan.svg" alt="Ambiental Pro" class="modal-logo">
                        <p>Preencha seus dados para iniciar o atendimento</p>
                    </div>
                    
                    <form id="contextForm" class="context-form">
                        <div class="form-group">
                            <label for="nome_aluno">Seu Nome</label>
                            <input type="text" id="nome_aluno" name="nome_aluno" placeholder="Digite seu nome" required autocomplete="off">
                        </div>
                        
                        <div class="form-group">
                            <label for="formacao_inicial">Formação Inicial (Graduação)</label>
                            <input type="text" id="formacao_inicial" name="formacao_inicial" placeholder="Ex: Engenharia Ambiental" required autocomplete="off">
                        </div>

                        <div class="form-group">
                            <label for="ano_conclusao">Ano de Conclusão</label>
                            <input type="text" id="ano_conclusao" name="ano_conclusao" placeholder="Ex: 2024" required autocomplete="off">
                        </div>

                        <div class="form-group">
                            <label for="estado_selecionado">Estado do Registro (CREA)</label>
                            <input type="text" id="estado_selecionado" name="estado_selecionado" placeholder="Ex: SP" required autocomplete="off">
                        </div>

                        <button type="submit" class="btn-primary">Concluir <i class="fa-solid fa-arrow-right"></i></button>
                    </form>
                </div>
            </div>

            <section class="chat-section disabled" id="chatSection">
                <div class="chat-overlay" id="chatOverlay">
                    <!-- Overlay de segurança removido o cadeado e texto para dar foco ao modal -->
                </div>
                
                <div class="chat-container">
                    <div class="chat-header">
                        <div class="agent-info">
                            <div class="agent-avatar">
                                <i class="fa-solid fa-robot"></i>
                                <span class="status-indicator"></span>
                            </div>
                            <div class="agent-details">
                                <h3>Consultor Especialista CREA</h3>
                                <span class="status-text">Pronto para ajudar</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="chat-messages" id="chatMessages">
                        <!-- Mensagens aparecerão aqui -->
                    </div>
                    
                    <div class="chat-suggestions" id="chatSuggestions">
                        <button class="suggestion-chip">Quais são as disciplinas e conteúdos exigidos por lei para a atribuição?</button>
                        <button class="suggestion-chip">Qual é o passo a passo para dar entrada no processo no CREA?</button>
                        <button class="suggestion-chip">A minha formação atual me permite assinar o georreferenciamento do INCRA?</button>
                    </div>

                    <div class="chat-input-container">
                        <form id="chatForm">
                            <input type="text" id="userInput" placeholder="Digite sua dúvida sobre atribuição CREA..." disabled autocomplete="off">
                            <button type="submit" id="sendBtn" disabled>
                                <i class="fa-solid fa-paper-plane"></i>
                            </button>
                        </form>
                    </div>
                    
                    <div class="footer-logos">
                        <img src="assets/CONFEA.svg" alt="Sistema CONFEA/CREA" class="confea-logo">
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
